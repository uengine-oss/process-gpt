# =====================================================================
# Process-GPT - Root Docker Compose (convenience wrapper)
# ---------------------------------------------------------------------
# This file uses `include` to compose the three layers:
#   - infra/    : shared infrastructure (Supabase, Neo4j, LiteLLM)
#   - compose/  : ProcessGPT microservices
#   - gateway/  : Nginx reverse proxy
#
# Requires Docker Compose v2.20 or newer.
#
# Quick start:
#   cp .env.example .env
#   docker compose up -d                     # everything
#   docker compose up -d frontend memento    # selected services + their deps
#
# Or use the interactive helper scripts:
#   ./start-all-services.sh    (Linux / macOS / Git Bash)
#   .\start-all-services.ps1   (Windows PowerShell)
# =====================================================================

name: process-gpt

# This root compose file is intentionally a SERVICE-LESS STUB. Its only job
# is to be the FIRST `-f` argument passed to `docker compose` by the helper
# scripts so that Compose v2 anchors every relative bind-mount path
# (`./infra/volumes/...`, `./gateway/nginx/...`, `./services/...`) to THIS
# directory (the repository root) rather than to the directory of the
# infra/compose/gateway sub-file that happens to declare it.
#
# Always launch via the helper scripts:
#   ./start-all-services.sh     (Linux / macOS / Git Bash)
#   .\start-all-services.ps1    (Windows PowerShell)
#
# Or, when calling docker compose yourself, layer ALL four files in this
# order so that the first one (this file) wins the working-directory race:
#   docker compose \
#     -f docker-compose.yml \
#     -f infra/docker-compose.yml \
#     -f compose/docker-compose.yml \
#     -f gateway/docker-compose.yml \
#     up -d
services: {}
