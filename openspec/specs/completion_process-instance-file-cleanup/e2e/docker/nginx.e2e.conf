# Dedicated reverse proxy for the completion_process-instance-file-cleanup
# suite. Listens on :8088 inside the container, mapped to host :8091 by
# docker-compose.e2e.yml. The test loads a Playwright-injected tester page
# at the gateway origin so storage requests stay same-origin.

user  nginx;
worker_processes  1;

events { worker_connections  1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    upstream frontend { server frontend:8080; }
    upstream storage_via_kong { server kong:8000; }

    server {
        listen 8088;
        server_name _;

        # Storage routes — pass through to kong, which forwards to the
        # supabase/storage-api container.
        location /storage/ {
            proxy_pass http://storage_via_kong;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;
        }

        # Anything else — the prebuilt frontend SPA. Kept proxied so the
        # gateway origin can serve a real page if a future scenario needs
        # one. The current suite is Category B (protocol-only) and the
        # Playwright tests do NOT navigate to the SPA; they only call
        # /storage/v1/* through this reverse proxy.
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
