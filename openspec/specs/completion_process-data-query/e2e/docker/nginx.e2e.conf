worker_processes 1;
events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    upstream completion_upstream   { server completion:8000; }
    upstream frontend_upstream     { server frontend:8080; }
    upstream mock_llm_pdq_upstream { server mock-llm-pdq:8080; }

    server {
        listen 8088;
        server_name _;

        # completion FastAPI - strip /completion prefix.
        location /completion/ {
            proxy_pass http://completion_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # mock-llm control surface (last-prompt) reachable same-origin so
        # the tester page can verify tenant scoping without CORS hacks.
        location /__mock-llm/ {
            proxy_pass http://mock_llm_pdq_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Everything else -> Vue SPA (only used as fallback origin).
        location / {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
