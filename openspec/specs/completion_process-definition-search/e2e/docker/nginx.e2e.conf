worker_processes 1;
events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    upstream completion_upstream { server host.docker.internal:8000; }

    server {
        listen 8088;
        server_name _;

        # Frontend: serve the prebuilt sourcemapped Vite bundle from
        # /frontend-dist (bind-mounted at compose level). try_files gives the
        # SPA history fallback that `vite preview` lacks.
        root /frontend-dist;
        index index.html;

        location /completion/ {
            proxy_pass http://completion_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
