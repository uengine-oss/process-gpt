# =====================================================================
# Process-GPT - completion_agent-memory-chat E2E gateway (nginx)
# ---------------------------------------------------------------------
# Single browser entry point on :8088.
#   /completion/<path>   -> completion:8000/<path>   (prefix STRIPPED)
#   /multi-agent/<path>  -> completion:8000/multi-agent/<path> (preserved)
#   /                    -> frontend:8080            (Vue SPA, URI preserved)
#
# The Vue frontend calls `fetch('/completion/multi-agent/chat')`, so the
# `/completion/` prefix is stripped before reaching the FastAPI routes
# that are mounted at `/multi-agent/*`. `/multi-agent/` is also exposed
# directly so protocol-level checks can reach the backend the same way.
# =====================================================================
events {}

http {
  # Docker Compose embedded DNS. Upstream hosts kept in variables so the
  # gateway boots even while completion is still warming up.
  resolver 127.0.0.11 valid=10s ipv6=off;
  resolver_timeout 5s;

  server {
    listen 8088;
    client_max_body_size 100m;

    # /completion/<path> -> completion:8000/<path>  (prefix stripped)
    location /completion/ {
      set $upstream_completion completion:8000;
      rewrite ^/completion/(.*)$ /$1 break;
      proxy_pass http://$upstream_completion;
      proxy_http_version 1.1;
      proxy_read_timeout 600s;
      proxy_send_timeout 600s;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /multi-agent/<path> -> completion:8000/multi-agent/<path>  (preserved)
    location /multi-agent/ {
      set $upstream_completion_direct completion:8000;
      proxy_pass http://$upstream_completion_direct;
      proxy_http_version 1.1;
      proxy_read_timeout 600s;
      proxy_send_timeout 600s;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # / -> frontend:8080  (Vue SPA, full URI preserved)
    location / {
      set $upstream_frontend frontend:8080;
      proxy_pass http://$upstream_frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
