schema: spec-driven

context: |
  Language: Korean (ko-KR)
  모든 OpenSpec 산출물은 한국어로 작성한다.

  이 저장소의 OpenSpec 문서는 "구현 요약"이 아니라 "시스템이 외부에 보장해야 하는 행위와 계약"을 표현한다.
  스펙은 코드의 함수명, 클래스명, 내부 변수명, 파일 라인 번호를 나열하지 않는다.
  코드 구조를 설명해야 할 때도 구현 세부가 아니라 사용자/클라이언트/운영자가 관찰할 수 있는 입력, 출력, 상태 변화, 오류 처리, 보안/성능 제약으로 추상화한다.

  원문 유지가 필요한 항목:
  - 공개 API 경로와 HTTP method
  - 공개 요청/응답 필드명
  - 스트리밍 이벤트명
  - 설정 키, 환경 변수명, SQL 키워드
  - 테스트 ID와 요구사항 ID

  구현 세부 정보의 사용 원칙:
  - specs 문서에는 내부 함수명, 클래스명, 모듈 경로, 라인 번호를 쓰지 않는다.
  - design 문서에는 구현 검토를 위해 필요한 경우에만 파일 경로 수준의 참조를 최소한으로 쓴다.
  - tasks 문서에는 테스트 또는 검증 대상을 식별하기 위한 경로를 쓸 수 있지만, 스펙 요구사항처럼 표현하지 않는다.

rules:
  proposal:
    - 기능의 목적, 사용자 가치, 외부 계약 변화만 설명한다.
    - 영향 범위에는 서비스/화면/API 수준만 적고, 내부 함수명·클래스명·라인 번호는 적지 않는다.
    - '"현재 구현은 X 함수에서 Y를 호출한다" 같은 코드 요약 문장을 피한다.'

  specs:
    - 스펙은 구현 독립적인 행위 계약으로 작성한다.
    - Requirement 제목은 사용자 또는 클라이언트 관점의 능력으로 작성한다.
    - Requirement 본문에는 SHALL/MUST를 사용해 관찰 가능한 입력, 출력, 상태, 오류, 제한을 정의한다.
    - Scenario는 Given/When/Then 또는 WHEN/THEN 중심으로 작성하고, 내부 구현 단계가 아니라 외부에서 검증 가능한 결과를 다룬다.
    - 내부 함수명, 클래스명, 모듈 경로, 파일 경로, 라인 번호, private helper 이름을 쓰지 않는다.
    - 공개 API 경로, 요청/응답 필드명, 이벤트명은 필요한 경우에만 원문으로 쓴다.
    - '"참조:", "구현:", "파일:", "라인:" 같은 코드 추적 문구를 Requirement/Scenario에 넣지 않는다.'
    - 테스트 가능성을 위해 요구사항 ID와 시나리오 ID를 둘 수 있지만, ID가 구현명을 포함하지 않게 한다.

  design:
    - 설계 문서는 스펙보다 더 기술적일 수 있으나, 먼저 아키텍처 결정과 트레이드오프를 설명한다.
    - 파일 경로와 모듈명은 "검토 대상" 또는 "구현 위치 후보"로만 최소한 사용한다.
    - 함수/클래스 목록을 나열하는 코드 인벤토리 형식은 피한다.

  tasks:
    - 기존 제품 코드를 변경하지 않는 테스트/검증 작업과 문서 보강 작업을 우선 작성한다.
    - 각 작업은 어떤 Requirement 또는 Scenario를 검증하는지 연결한다.
    - 작업 설명은 구현 세부 나열보다 검증 목적과 완료 기준을 중심으로 작성한다.
