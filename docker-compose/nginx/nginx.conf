events {}

http {
  upstream frontend_upstream {
    server frontend:8080;
  }

  upstream completion_upstream {
    server completion:8000;
  }

  upstream memento_upstream {
    server memento:8005;
  }

  upstream glossary_backend_upstream {
    server robo-data-glossary-backend:5504;
  }

  upstream process-gpt-base-agent-langchain-react_upstream {
    server process-gpt-base-agent-langchain-react:8000;
  }

  upstream deepagents_upstream {
    server deepagents:8888;
  }

  server {
    listen 8088;
    client_max_body_size 10g;

    location = /agent/chat/stream {
      proxy_pass http://process-gpt-base-agent-langchain-react_upstream/chat/stream;
      proxy_http_version 1.1;
      proxy_buffering off;
      proxy_read_timeout 3600s;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /agent-router/route {
      return 503;
    }

    location = /deepagents/chat/stream {
      proxy_pass http://deepagents_upstream/chat/stream;
      proxy_http_version 1.1;
      proxy_buffering off;
      proxy_read_timeout 3600s;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://frontend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /langchain-chat/ {
      proxy_pass http://completion_upstream/langchain-chat/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /memento/ {
      proxy_pass http://memento_upstream/;
      proxy_connect_timeout 600s;
      proxy_send_timeout 600s;
      proxy_read_timeout 600s;
      send_timeout 600s;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /robo/ {
      proxy_pass http://glossary_backend_upstream/robo/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /deepagents/ {
      proxy_pass http://deepagents_upstream/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
