litellm_settings:
  drop_params: true
  set_verbose: false
  # Upstream가 순간적으로 `Connection refused`를 주는 경우
  # completion 호출 자체를 더 자주 재시도해서 500을 줄입니다.
  num_retries: 6
  request_timeout: 120

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
