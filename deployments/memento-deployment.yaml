apiVersion: apps/v1
kind: Deployment
metadata:
  annotations: {}
  name: memento-deployment
  namespace: dev
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: memento
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: memento
    spec:
      # Spot VM 사용 (비용 절감)
      nodeSelector:
        cloud.google.com/gke-spot: "true"
      containers:
        - env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: MEMENTO_LLM_PROVIDER
              value: "openai"
            - name: MEMENTO_EMBEDDING_PROVIDER
              value: "openai"
            - name: LLM_PROXY_URL
              value: "http://litellm-proxy:4000"
            - name: LLM_PROXY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-proxy-secret
                  key: LLM_PROXY_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  key: OPENAI_API_KEY
                  name: openai-secret
            - name: SUPABASE_URL
              valueFrom:
                configMapKeyRef:
                  key: SUPABASE_URL
                  name: my-config
            - name: SUPABASE_KEY
              valueFrom:
                secretKeyRef:
                  key: SERVICE_ROLE_KEY
                  name: my-secrets
          image: ghcr.io/uengine-oss/process-gpt-memento:44d28f7
          imagePullPolicy: IfNotPresent
          name: memento
          ports:
            - containerPort: 8005
              protocol: TCP
          resources:
            limits:
              ephemeral-storage: 1Gi
              memory: 1024Mi
            requests:
              cpu: 50m
              ephemeral-storage: 1Gi
              memory: 640Mi
          securityContext:
            capabilities:
              drop:
                - NET_RAW
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - mountPath: /secrets
              name: google-credentials
              readOnly: true
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      tolerations:
        - effect: NoSchedule
          key: kubernetes.io/arch
          operator: Equal
          value: amd64
        - effect: NoSchedule
          key: cloud.google.com/gke-spot
          operator: Equal
          value: "true"
      volumes:
        - name: google-credentials
          secret:
            defaultMode: 420
            secretName: google-credentials
