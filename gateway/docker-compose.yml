# =====================================================================
# Process-GPT API Gateway (Nginx)
# ---------------------------------------------------------------------
# Reverse proxy / single entry point for the frontend and back-end services.
# Listens on host port 8088 by default. Routes:
#   /                        -> frontend
#   /langchain-chat/         -> completion
#   /memento/                -> memento
#   /robo/                   -> robo-data-glossary-backend
#   /agent/chat/stream       -> process-gpt-base-agent-langchain-react
#   /deepagents/             -> deepagents
#
# Edit nginx/nginx.conf to add routes for additional microservices.
# =====================================================================

name: process-gpt

services:
  nginx:
    image: nginx:latest
    container_name: process-gpt-nginx
    ports:
      - "${GATEWAY_HTTP_PORT:-8088}:8088"
    volumes:
      - ./gateway/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
