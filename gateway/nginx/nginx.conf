events {}

http {
  # Use Docker Compose's embedded DNS (127.0.0.11). With `resolver` set and
  # upstream hosts placed in a *variable*, nginx defers DNS lookup until a
  # request actually hits that location -- so the gateway boots even if an
  # optional microservice (e.g. robo-data-glossary-backend, deepagents) was
  # NOT selected at startup. Unreachable services just return 502 on demand
  # instead of preventing nginx from coming up at all.
  #
  # Note: when proxy_pass uses a variable, nginx does NOT auto-strip the
  # location prefix the way it does for a static upstream. So every
  # location below explicitly rewrites the URI before proxy_pass.
  resolver 127.0.0.11 valid=10s ipv6=off;
  resolver_timeout 5s;

  server {
    listen 8088;
    client_max_body_size 10g;

    # /agent/chat/stream  ->  base-agent-langchain-react:8000 /chat/stream
    location = /agent/chat/stream {
      set $upstream_agent process-gpt-base-agent-langchain-react:8000;
      proxy_pass http://$upstream_agent/chat/stream;
      proxy_http_version 1.1;
      proxy_buffering off;
      proxy_read_timeout 3600s;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /agent-router/route {
      return 503;
    }

    # /deepagents/chat/stream  ->  deepagents:8888 /chat/stream
    location = /deepagents/chat/stream {
      set $upstream_deepagents deepagents:8888;
      proxy_pass http://$upstream_deepagents/chat/stream;
      proxy_http_version 1.1;
      proxy_buffering off;
      proxy_read_timeout 3600s;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /  ->  frontend:8080 (full URI preserved)
    location / {
      set $upstream_frontend frontend:8080;
      proxy_pass http://$upstream_frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /langchain-chat/<path>  ->  completion:8000 /langchain-chat/<path>
    # (prefix PRESERVED -- the completion service mounts its routes under
    # /langchain-chat/* so we forward the URI as-is.)
    location /langchain-chat/ {
      set $upstream_completion completion:8000;
      proxy_pass http://$upstream_completion;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /completion/<path>  ->  completion:8000 /langchain-chat/<path>
    # The frontend calls /completion/* (e.g. /completion/sanity-check,
    # /completion/set-tenant) but the completion service mounts its routes
    # under /langchain-chat/*, so rewrite the prefix. Without this the calls
    # fall through to `location /` and return the SPA index (HTML), which
    # breaks the frontend's checkBackendConnection() JSON parse and stalls
    # process generation at "생각 중...".
    # /completion/<path>  ->  completion:8000 /<path>   (prefix STRIPPED)
    # The frontend uses backendUrl "/completion/langchain-chat" and also calls
    # /completion/set-tenant, i.e. it prefixes every completion call with
    # "/completion". The completion service itself mounts routes at
    # /langchain-chat/* and /set-tenant (root), so we ONLY strip the
    # "/completion" prefix and forward the rest as-is:
    #   /completion/langchain-chat/sanity-check -> /langchain-chat/sanity-check
    #   /completion/set-tenant                  -> /set-tenant
    # Without this the calls fall through to `location /` and return the SPA
    # index (HTML), which breaks checkBackendConnection() and stalls generation.
    location /completion/ {
      set $upstream_completion_c completion:8000;
      rewrite ^/completion/(.*)$ /$1 break;
      proxy_pass http://$upstream_completion_c;
      proxy_http_version 1.1;
      proxy_buffering off;
      proxy_read_timeout 3600s;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /memento/<path>  ->  memento:8005 /<path>     (prefix STRIPPED)
    location /memento/ {
      set $upstream_memento memento:8005;
      rewrite ^/memento/(.*)$ /$1 break;
      proxy_pass http://$upstream_memento;
      proxy_connect_timeout 600s;
      proxy_send_timeout 600s;
      proxy_read_timeout 600s;
      send_timeout 600s;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /robo/<path>  ->  robo-data-glossary-backend:5504 /robo/<path>
    # (prefix PRESERVED -- glossary backend mounts its routes under /robo/*.)
    location /robo/ {
      set $upstream_glossary robo-data-glossary-backend:5504;
      proxy_pass http://$upstream_glossary;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /deepagents/<path>  ->  deepagents:8888 /<path>   (prefix STRIPPED)
    location /deepagents/ {
      set $upstream_deepagents_root deepagents:8888;
      rewrite ^/deepagents/(.*)$ /$1 break;
      proxy_pass http://$upstream_deepagents_root;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /instance-classifier/<path> -> instance-classifier:8000 /<path> (prefix STRIPPED)
    # 인스턴스 자동분류 · Top List · 유사 인스턴스 API.
    location /instance-classifier/ {
      set $upstream_instclf instance-classifier:8000;
      rewrite ^/instance-classifier/(.*)$ /$1 break;
      proxy_pass http://$upstream_instclf;
      proxy_connect_timeout 600s;
      proxy_send_timeout 600s;
      proxy_read_timeout 600s;
      send_timeout 600s;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /strategy-service/<path> -> strategy:8000 /<path> (prefix STRIPPED)
    # BSC 전략맵 · KPI · 이니셔티브 · 설문 성과수집 API.
    location /strategy-service/ {
      set $upstream_strategy strategy:8000;
      rewrite ^/strategy-service/(.*)$ /$1 break;
      proxy_pass http://$upstream_strategy;
      proxy_connect_timeout 300s;
      proxy_send_timeout 300s;
      proxy_read_timeout 300s;
      send_timeout 300s;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
