# =====================================================================
# Process-GPT - Shared E2E orchestration entrypoint
# ---------------------------------------------------------------------
# Run from the repository root:
#   docker compose -f docker-compose.e2e.yml up -d --build
#   docker compose -f docker-compose.e2e.yml down -v        # full reset
#
# Compose auto-loads the repo-root `.env` for ${VAR} substitution.
#
# This file boots the real in-repository request path for OpenSpec E2E
# suites. The completion_agent-memory-chat suite exercises:
#   browser -> gateway(nginx) -> completion -> { mem0/pgvector(db), mock-llm }
#   browser -> kong -> { auth(GoTrue), rest(PostgREST) } -> db
#
# Only nondeterministic EXTERNAL boundaries are stubbed:
#   - mock-llm            : OpenAI-compatible LLM + embedding stub
#   - mock-external-agent : external A2A agent card stub
# Every in-repository service (completion, gateway, frontend, Supabase,
# database) runs for real.
#
# Suite-specific files live under:
#   openspec/specs/completion_agent-memory-chat/e2e/{docker,scripts,seed_files}
# =====================================================================

name: process-gpt-e2e

services:
  # ------------------------------------------------------------------
  # Supabase - Postgres database (pgvector for mem0 agent memory)
  # ------------------------------------------------------------------
  db:
    image: supabase/postgres:15.8.1.060
    container_name: process-gpt-e2e-db
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - log_min_messages=fatal
    environment:
      POSTGRES_HOST: /var/run/postgresql
      PGPORT: 5432
      POSTGRES_PORT: 5432
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: postgres
      POSTGRES_DB: postgres
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: ${JWT_EXPIRY}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h localhost"]
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 60s
    volumes:
      - ./infra/volumes/db/realtime.sql:/docker-entrypoint-initdb.d/migrations/99-realtime.sql:ro
      - ./infra/volumes/db/webhooks.sql:/docker-entrypoint-initdb.d/init-scripts/98-webhooks.sql:ro
      - ./infra/volumes/db/roles.sql:/docker-entrypoint-initdb.d/init-scripts/99-roles.sql:ro
      - ./infra/volumes/db/jwt.sql:/docker-entrypoint-initdb.d/init-scripts/99-jwt.sql:ro
      - ./infra/volumes/db/_supabase.sql:/docker-entrypoint-initdb.d/migrations/97-_supabase.sql:ro
      - ./infra/volumes/db/logs.sql:/docker-entrypoint-initdb.d/migrations/99-logs.sql:ro
      - ./infra/volumes/db/pooler.sql:/docker-entrypoint-initdb.d/migrations/99-pooler.sql:ro
      - ./init.sql:/docker-entrypoint-initdb.d/init-scripts/100-init.sql:ro
      - e2e-db-data:/var/lib/postgresql/data

  # ------------------------------------------------------------------
  # Supabase - Kong API gateway (browser reaches auth/rest through this)
  # ------------------------------------------------------------------
  kong:
    image: kong:2.8.1
    container_name: process-gpt-e2e-kong
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "54321:8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      KONG_TRUSTED_IPS: 0.0.0.0/0,::/0
      KONG_REAL_IP_FROM: 0.0.0.0/0,::/0
      KONG_REAL_IP_HEADER: X-Forwarded-For
      KONG_REAL_IP_RECURSIVE: "on"
    volumes:
      - ./infra/volumes/api/kong.yml:/home/kong/temp.yml:ro
    entrypoint: bash -c 'eval "echo \"$$(cat ~/temp.yml)\"" > ~/kong.yml && /docker-entrypoint.sh kong docker-start'

  # ------------------------------------------------------------------
  # Supabase - GoTrue (browser login / auth)
  # ------------------------------------------------------------------
  auth:
    image: supabase/gotrue:v2.177.0
    container_name: process-gpt-e2e-auth
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      timeout: 25s
      interval: 5s
      retries: 20
      start_period: 30s
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_URI_ALLOW_LIST: "*"
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${JWT_EXPIRY}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_SMTP_MAX_FREQUENCY: 1s
      GOTRUE_EXTERNAL_PHONE_ENABLED: "false"
      GOTRUE_SMS_AUTOCONFIRM: "true"

  # ------------------------------------------------------------------
  # Supabase - PostgREST (frontend reads users/profile through this)
  # ------------------------------------------------------------------
  rest:
    image: postgrest/postgrest:v12.2.12
    container_name: process-gpt-e2e-rest
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMAS: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: ${JWT_EXPIRY}
    command: "postgrest"

  # ------------------------------------------------------------------
  # Deterministic stubs (the only stubbed external boundaries)
  # ------------------------------------------------------------------
  mock-llm:
    image: python:3.12-slim
    container_name: process-gpt-e2e-mock-llm
    working_dir: /app
    volumes:
      - ./openspec/specs/completion_agent-memory-chat/e2e/scripts:/app:ro
    command: ["python", "-u", "mock_llm.py"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=3).read()"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    ports:
      - "8899:8080"

  mock-external-agent:
    image: python:3.12-slim
    container_name: process-gpt-e2e-mock-external-agent
    working_dir: /app
    volumes:
      - ./openspec/specs/completion_agent-memory-chat/e2e/scripts:/app:ro
    command: ["python", "-u", "mock_external_agent.py"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health', timeout=3).read()"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ------------------------------------------------------------------
  # completion - owning backend (built from current repository source)
  # ------------------------------------------------------------------
  completion:
    build:
      context: ./services/completion
    image: process-gpt-e2e-completion:local
    container_name: process-gpt-e2e-completion
    depends_on:
      db:
        condition: service_healthy
      mock-llm:
        condition: service_started
    environment:
      ENV: production
      LLM_MODEL: gpt-4o
      OPENAI_MODEL: gpt-4o
      LLM_EMBEDDING_MODEL: text-embedding-3-small
      LLM_PROXY_URL: http://mock-llm:8080/v1
      LLM_PROXY_API_KEY: e2e-mock-key
      OPENAI_API_KEY: e2e-mock-key
      OPENAI_BASE_URL: http://mock-llm:8080/v1
      SUPABASE_URL: http://kong:8000
      SUPABASE_KEY: ${SERVICE_ROLE_KEY}
      SUPABASE_JWT_SECRET: ${JWT_SECRET}
      DB_NAME: postgres
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/multi-agent/health-check', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s
    ports:
      - "8000:8000"

  # ------------------------------------------------------------------
  # frontend - Vue SPA (prebuilt image)
  # ------------------------------------------------------------------
  frontend:
    image: ghcr.io/uengine-oss/process-gpt:e343845
    container_name: process-gpt-e2e-frontend
    environment:
      VITE_SUPABASE_URL: ${API_EXTERNAL_URL}
      VITE_SUPABASE_KEY: ${ANON_KEY}
      VITE_GS_MODE: "false"

  # ------------------------------------------------------------------
  # gateway - nginx reverse proxy (single browser entry point :8088)
  # ------------------------------------------------------------------
  gateway:
    image: nginx:1.27-alpine
    container_name: process-gpt-e2e-gateway
    depends_on:
      - frontend
      - completion
    ports:
      - "8088:8088"
    volumes:
      - ./openspec/specs/completion_agent-memory-chat/e2e/docker/nginx.e2e.conf:/etc/nginx/nginx.conf:ro

  # ------------------------------------------------------------------
  # db-seed - one-shot login user / agent profile seeding
  # ------------------------------------------------------------------
  db-seed:
    image: postgres:16-alpine
    container_name: process-gpt-e2e-db-seed
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./openspec/specs/completion_agent-memory-chat/e2e/seed_files/e2e_seed.sql:/seed/e2e_seed.sql:ro
    command: >
      psql -h db -p 5432 -U supabase_admin -d postgres
      -v ON_ERROR_STOP=1 -f /seed/e2e_seed.sql
    restart: "no"

  # ------------------------------------------------------------------
  # db-seed-process-search - one-shot process-definition search seeding
  #   (completion_process-definition-search E2E suite)
  # ------------------------------------------------------------------
  db-seed-process-search:
    image: postgres:16-alpine
    container_name: process-gpt-e2e-db-seed-process-search
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./openspec/specs/completion_process-definition-search/e2e/seed_files/e2e_seed.sql:/seed/e2e_seed.sql:ro
    command: >
      psql -h db -p 5432 -U supabase_admin -d postgres
      -v ON_ERROR_STOP=1 -f /seed/e2e_seed.sql
    restart: "no"

  # ------------------------------------------------------------------
  # db-seed-workitem-submission - one-shot process workitem seeding
  #   (completion_process-workitem-submission E2E suite)
  #   Seeds proc_def / proc_def_version / configuration / form_def /
  #   bpm_proc_inst / todolist for the workitem create+submit suite.
  # ------------------------------------------------------------------
  db-seed-workitem-submission:
    image: postgres:16-alpine
    container_name: process-gpt-e2e-db-seed-workitem-submission
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./openspec/specs/completion_process-workitem-submission/e2e/seed_files/e2e_seed.sql:/seed/e2e_seed.sql:ro
    command: >
      psql -h db -p 5432 -U supabase_admin -d postgres
      -v ON_ERROR_STOP=1 -f /seed/e2e_seed.sql
    restart: "no"

volumes:
  e2e-db-data:
